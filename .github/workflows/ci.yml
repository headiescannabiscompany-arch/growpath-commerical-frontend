name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo dependency versions
        run: npx expo install --check

      - name: Run Expo Doctor
        run: |
          set +e
          OUTPUT=$(npx expo-doctor 2>&1)
          STATUS=$?
          printf '%s\n' "$OUTPUT"
          if [ $STATUS -eq 0 ]; then
            exit 0
          fi
          # Fail if there are warnings besides the known Android API 34 requirement.
          WARNINGS=$(printf '%s\n' "$OUTPUT" | grep -c $'\342\234\226 Check')
          if [ "$WARNINGS" -eq 1 ] && printf '%s\n' "$OUTPUT" | grep -q "Android API level 34"; then
            echo "expo-doctor warning acknowledged: Expo SDK 49 targets Android API 33. Ignoring until the SDK 50+ upgrade."
            exit 0
          fi
          exit $STATUS

      - name: Audit production dependencies
        run: npm run audit:ci

      - name: Run lint
        run: npm run lint:ci

      - name: Guard sensitive copy
        run: npm run check:sensitive-copy

      - name: Verify Codex Browser workflow contract
        run: npm run verify:codex-workflow

      - name: Run delivery guard
        run: npm run guard

      - name: Run tests
        run: npm run test:ci
