services:
  - type: web
    name: growpath-commerical-frontend
    runtime: static
    buildCommand: npm run export:web:production
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.19.4
      - key: EXPO_PUBLIC_API_URL
        value: https://api.growpathai.com
      - key: EXPO_PUBLIC_SENTRY_DSN
        sync: false
      - key: EXPO_PUBLIC_PRIVACY_URL
        value: https://growpathai.com/privacy
      - key: EXPO_PUBLIC_TERMS_URL
        value: https://growpathai.com/terms
      - key: EXPO_PUBLIC_SUPPORT_URL
        value: https://growpathai.com/support
      - key: EXPO_PUBLIC_DELETE_ACCOUNT_URL
        value: https://growpathai.com/account/delete
      - key: EXPO_PUBLIC_TWITCH_PARENT_HOST
        value: growpathai.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
